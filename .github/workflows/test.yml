name: Tests

# Runs the busted unit-test suite on every push and pull request so
# regressions are caught before a change reaches main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  busted:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install busted
        run: luarocks install busted

      - name: Run tests
        run: busted
