# Liquid Glass skin: override default mouse wheel behavior.
# Route scroll to our Lua handler so it can show the centered seek OSD.
WHEEL_UP    script-message-to uosc lg-scroll-up
WHEEL_DOWN  script-message-to uosc lg-scroll-down

# ── Seek / video progress ──────────────────────────────────────────────
# Arrow keys + gamer keys (A/D). Flashes the timeline for visual feedback.
LEFT   seek -5 ; script-binding uosc/flash-timeline
RIGHT  seek  5 ; script-binding uosc/flash-timeline
a      seek -5 ; script-binding uosc/flash-timeline
d      seek  5 ; script-binding uosc/flash-timeline

# ── Volume ─────────────────────────────────────────────────────────────
# Arrow keys + gamer keys (W/S). Flashes the volume control for feedback.
UP     add volume  5 ; script-binding uosc/flash-volume
DOWN   add volume -5 ; script-binding uosc/flash-volume
w      add volume  5 ; script-binding uosc/flash-volume
s      add volume -5 ; script-binding uosc/flash-volume

# ── Right-click: toggle pause with a centered YouTube-style OSD ─────────
MBTN_RIGHT  cycle pause ; script-binding uosc/flash-pause-indicator

# ── Number keys: jump to a percentage of the video (scales with duration) ─
# 0 = start, 1 = 10%, 2 = 20% … 9 = 90%
0  seek  0 absolute-percent ; script-binding uosc/flash-timeline
1  seek 10 absolute-percent ; script-binding uosc/flash-timeline
2  seek 20 absolute-percent ; script-binding uosc/flash-timeline
3  seek 30 absolute-percent ; script-binding uosc/flash-timeline
4  seek 40 absolute-percent ; script-binding uosc/flash-timeline
5  seek 50 absolute-percent ; script-binding uosc/flash-timeline
6  seek 60 absolute-percent ; script-binding uosc/flash-timeline
7  seek 70 absolute-percent ; script-binding uosc/flash-timeline
8  seek 80 absolute-percent ; script-binding uosc/flash-timeline
9  seek 90 absolute-percent ; script-binding uosc/flash-timeline
