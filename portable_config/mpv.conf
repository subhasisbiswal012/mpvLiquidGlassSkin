# mpv core config for the Liquid Glass skin.
#
# uosc is our OSC. Disable mpv's built-in OSC and OSD bar so they don't
# render their own progress bar / overlay on top of ours during seeks
# (arrow-key seek triggers mpv's native seek indicator otherwise).
osc=no
osd-bar=no

# Keep on-screen text messages (volume, audio track, etc.) — those are
# uosc-independent and useful. Disable just the bar.
