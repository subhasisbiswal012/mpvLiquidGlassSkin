# Liquid Glass skin — runtime options

liquid_glass_theme=dark
liquid_glass_intensity=1.0
liquid_glass_accent=E8553A
liquid_glass_show_frost_noise=yes
reduced_motion=no

# Small-window minimums (px). The player will refuse to shrink below these
# floors so controls can never overlap. Landscape values are used for normal
# 16:9-ish videos; portrait values kick in for vertical / reels / shorts.
liquid_glass_min_width_landscape=1240
liquid_glass_min_height_landscape=420
liquid_glass_min_width_portrait=510
liquid_glass_min_height_portrait=480
